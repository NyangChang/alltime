<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>AllTime - App Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Hiragino Maru Gothic Pro', 'Rounded Mplus 1c', sans-serif; overscroll-behavior: none; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  /* ── APOMO用スタイル ── */
  .apomo-root {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    background: #fff; display: flex; flex-direction: column; align-items: center;
    min-height: 100dvh; padding: 24px 16px 32px; color: #222; max-width: 400px; margin: 0 auto;
  }
  .apomo-root .app-header { text-align: center; margin-bottom: 28px; }
  .apomo-root .app-title { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; color: #222; }
  .apomo-root .timer-wrapper { position: relative; width: 260px; height: 260px; margin-bottom: 28px; }
  .apomo-root .timer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .apomo-root .timer-bg-circle { fill: none; stroke: #f0f0f0; stroke-width: 8; }
  .apomo-root .timer-progress-circle { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke 0.4s ease; }
  .apomo-root .timer-header { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 12px; }
  .apomo-root .timer-display { font-size: 52px; font-weight: 700; letter-spacing: 0.02em; line-height: 1; font-variant-numeric: tabular-nums; color: #222; }
  .apomo-root .timer-status { font-size: 13px; font-weight: 600; padding: 4px 14px; border-radius: 20px; letter-spacing: 0.04em; transition: background 0.4s, color 0.4s; }
  .apomo-root .timer-center { position: absolute; inset: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border-radius: 50%; cursor: pointer; background: transparent; transition: transform 0.1s, background 0.25s; overflow: hidden; }
  .apomo-root .timer-center:active { transform: scale(0.93); }
  .apomo-root .timer-center .shindoi-emoji { font-size: 52px; line-height: 1; }
  .apomo-root .timer-center .shindoi-label { font-size: 14px; font-weight: 700; color: #D04040; letter-spacing: 0.05em; }
  .apomo-root .status-standby, .apomo-root .status-idling, .apomo-root .status-choice, .apomo-root .status-working { background: #FFF0E0; color: #FF7A00; }
  .apomo-root .status-break { background: #E8F4FD; color: #4EA8DE; }
  .apomo-root .controls { display: flex; align-items: center; gap: 28px; margin-bottom: 20px; }
  .apomo-root .btn-main { width: 64px; height: 64px; border-radius: 50%; border: none; background: #FF7A00; color: #fff; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 16px rgba(255,122,0,0.4); transition: transform 0.1s, box-shadow 0.1s; }
  .apomo-root .btn-main:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(255,122,0,0.3); }
  .apomo-root .btn-main.break-mode { background: #4EA8DE; box-shadow: 0 4px 16px rgba(78,168,222,0.4); }
  .apomo-root .btn-icon { width: 44px; height: 44px; border-radius: 50%; border: none; background: transparent; color: #888; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color 0.15s, transform 0.1s; }
  .apomo-root .btn-icon:hover { color: #444; }
  .apomo-root .btn-icon:active { transform: scale(0.9); }
  .apomo-root .btn-icon:disabled { opacity: 0.3; cursor: default; }
  .apomo-root .description-area { width: 100%; max-width: 320px; min-height: 72px; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; margin-bottom: 16px; position: relative; }
  .apomo-root .description-text { font-size: 13px; color: #555; line-height: 1.7; }
  .apomo-root .icon-decoration { position: absolute; bottom: 0; right: 4px; font-size: 28px; opacity: 0.65; }
  .apomo-root .choice-panel { width: 100%; max-width: 320px; display: none; gap: 10px; margin-top: 4px; }
  .apomo-root .choice-panel.visible { display: flex; }
  .apomo-root .btn-choice { flex: 1; border: none; border-radius: 12px; padding: 14px 10px; cursor: pointer; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; transition: transform 0.1s, opacity 0.15s; }
  .apomo-root .btn-choice:active { transform: scale(0.97); }
  .apomo-root .btn-choice.continue { background: #FF7A00; color: #fff; }
  .apomo-root .btn-choice.rest { background: #FFF0E0; color: #FF7A00; border: 1.5px solid #FFD0A0; }
  .apomo-root .choice-icon { font-size: 18px; }
  .apomo-root .choice-label { font-size: 15px; font-weight: 700; }
  .apomo-root .choice-desc { font-size: 11px; opacity: 0.85; line-height: 1.4; }
  @keyframes pulse-ring { 0% { opacity: 0.5; r: 112; } 50% { opacity: 0.15; r: 118; } 100% { opacity: 0.5; r: 112; } }
  .apomo-root .pulse-circle { fill: none; stroke: #FF7A00; stroke-width: 3; opacity: 0; animation: none; }
  .apomo-root .pulse-circle.active { opacity: 0.4; animation: pulse-ring 2.2s ease-in-out infinite; }
  .apomo-root .session-stats { margin-top: 20px; text-align: center; font-size: 12px; color: #bbb; }
  .apomo-root .session-stats span { color: #FF7A00; font-weight: 600; }
  .apomo-root .shindoi-section { width: 100%; max-width: 320px; margin-bottom: 14px; }
  .apomo-root .shindoi-gauge-wrap { display: flex; flex-direction: column; gap: 5px; }
  .apomo-root .shindoi-gauge-bg { height: 20px; background: #f0f0f0; border-radius: 12px; overflow: hidden; }
  .apomo-root .shindoi-gauge-fill { height: 100%; width: 0%; border-radius: 12px; background: #4EA8DE; transition: width 0.15s ease, background 0.3s ease; }
  .apomo-root .shindoi-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
  .apomo-root .shindoi-count-text { color: #ccc; }
  .apomo-root .shindoi-explosion-badge { color: #FF3B30; font-weight: 700; font-size: 12px; }
  @keyframes gauge-shake { 0%,100%{transform:translateX(0) rotate(0deg)} 20%{transform:translateX(-5px) rotate(-1.5deg)} 40%{transform:translateX(5px) rotate(1.5deg)} 60%{transform:translateX(-4px) rotate(-1deg)} 80%{transform:translateX(4px) rotate(1deg)} }
  .apomo-root .shindoi-gauge-wrap.shaking { animation: gauge-shake 0.35s ease-in-out infinite; }
  @keyframes gauge-explode { 0%{transform:scale(1,1)} 20%{transform:scale(1.06,1.5)} 45%{transform:scale(0.97,1.1)} 65%{transform:scale(1.03,1.25)} 85%{transform:scale(0.99,1.0)} 100%{transform:scale(1,1)} }
  .apomo-root .shindoi-gauge-wrap.exploding { animation: gauge-explode 0.5s ease-out forwards; }
  @keyframes confetti-fall { 0%{transform:translateY(-10px) rotate(0deg) scale(1);opacity:1} 80%{opacity:1} 100%{transform:translateY(105vh) rotate(720deg) scale(0.5);opacity:0} }
  .confetti-piece { position: fixed; top: -15px; border-radius: 3px; animation: confetti-fall linear forwards; z-index: 9999; pointer-events: none; }
  .apomo-root .btn-back-home { background: linear-gradient(135deg,#ffb3c8,#ff9eb5); border: none; border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 700; color: white; cursor: pointer; margin-top: 16px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- 分割JSを順序保証して結合・実行するローダー -->
<script>
(async function() {
  const files = [
    'js/utils.js', 'js/emotions.js', 'js/usage.js',
    'js/memo.js', 'js/pomodoro.js', 'js/timer.js', 'js/app.js'
  ];
  const sources = [];
  const cacheBust = '_v=' + Date.now();
  for (const f of files) {
    const res = await fetch(f + '?' + cacheBust);
    sources.push(await res.text());
  }
  const combined = sources.join('\n;\n');
  const transformed = Babel.transform(combined, { presets: ['react'] }).code;
  const script = document.createElement('script');
  script.textContent = transformed;
  document.body.appendChild(script);
})();
</script>
</body>
</html>
